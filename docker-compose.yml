services:
  postgres:
    image: postgres:17-alpine
    container_name: ziphub-postgres
    environment:
      POSTGRES_DB: ziphub
      POSTGRES_USER: ziphub
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ziphub -d ziphub"]
      interval: 3s
      timeout: 2s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
